<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monomente - Inicio</title>
    <link href="https://fonts.googleapis.com/css2?family=Agrandir:wght@400;700&family=Lexend:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* 1. Configuración General */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Agrandir', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body, html {
            height: 100%;
            width: 100%;
            background-color: #f6e9d7;
        }

        /* 2. El Contenedor Principal (Flexbox) */
        .main-container {
            display: flex;
            height: 100vh;
            flex-direction: row; /* Lado a lado en PC */
        }

        /* 3. Lado Izquierdo (Verde) */
        .left-side {
            flex: 1;
            background-color: #b1ffb1; /* Verde clarito como el de tu monito */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 20px;
            margin: 15px;
            border-radius: 65px;
        }

        .logo-container img {
            max-width: 80%;
            height: auto;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            /* Aquí pondrás la imagen que exportes de Canva */
        }

        .brand-title-svg {
            position: absolute;
            bottom: 4%;
            left: 50%;
            transform: translateX(-50%);
        }

        /* 4. Lado Derecho (Crema) */
        .right-side {
            flex: 1;
            background-color: ##f6e9d7; /* Color crema de fondo */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px;
        }

        .slogan {
            font-size: 2.5rem;
            color: #2d5a27; /* Verde oscuro para el texto */
            margin-bottom: 30px;
            font-weight: bold;
            max-width: 400px;
        }

        /* 5. El Botón de Comenzar */
        .btn-comenzar {
            background-color: #9dffb1;
            color: #080707;
            border: 2px solid #000000;
            padding: 15px 40px;
            font-size: 2.2rem;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none; /* Quita el subrayado del link */
            transition: all 0.3s ease;
        }

        .btn-comenzar:hover {
            background-color: #ffffff;
            color: white;
        }

        /* 5.5 Nubes */
        .cloud {
            position: absolute;
            width: 120px;
            height: 80px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            z-index: -1;
        }

        .cloud::before {
            content: '';
            position: absolute;
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            top: -30px;
            left: 20px;
        }

        .cloud::after {
            content: '';
            position: absolute;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            top: -20px;
            right: 10px;
        }

        .cloud1 {
            top: 10%;
            left: 10%;
        }

        .cloud2 {
            top: 20%;
            right: 15%;
        }

        .cloud3 {
            bottom: 15%;
            left: 40%;
        }

        /* 6. RESPONSIVO: Ajustes para Celular */
        @media (max-width: 768px) {
            .main-container {
                flex-direction: column; /* Apila uno arriba del otro */
            }
            .left-side, .right-side {
                flex: none;
                height: 50vh; /* Mitad de pantalla para cada uno */
            }
            .slogan {
                font-size: 1.8rem;
            }
            .cloud {
                display: none;
            }
        }
    </style>
</head>
<body>

    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    <div class="cloud cloud3"></div>

    <div class="main-container">
        <section class="left-side">
            <div class="logo-container">
                <img src="logo.png" alt="Logo Monomente">
            </div>
            <svg class="brand-title-svg" width="250" height="200" viewBox="0 0 250 160">
                <defs>
                    <path id="curve" d="M 10 80 Q 125 200 240 80" />
                </defs>
                <text font-family="Lexend" font-size="42" fill="#2d5a27" font-weight="700" text-anchor="middle" letter-spacing="2px">
                    <textPath href="#curve" startOffset="50%">MonoMente</textPath>
                </text>
            </svg>
        </section>

        <section class="right-side">
            <h1 class="slogan">Cuida tu mente relaja tu mundo</h1>
            
            <a href="segundo.html" class="btn-comenzar">Comenzar</a>
        </section>
    </div>

</body>
</html>
